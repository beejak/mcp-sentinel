name: Python CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    name: Test Suite (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        exclude:
          # Reduce matrix size — full cross-product only on Linux
          - os: macos-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.9"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short
        timeout-minutes: 10

      - name: Run tests with coverage (Ubuntu 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          mkdir -p reports
          python -m pytest tests/ \
            --cov=src/mcp_sentinel \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=term
        timeout-minutes: 10

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          pip install -e .

      - name: ruff
        run: ruff check src/ --output-format=github
        continue-on-error: true

      - name: mypy
        run: mypy src/mcp_sentinel --ignore-missing-imports
        continue-on-error: true

  self-scan:
    name: Self Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install MCP Sentinel
        run: pip install -e .

      - name: Run self-scan
        run: |
          mcp-sentinel scan src/ \
            --output sarif \
            --json-file results.sarif \
            --no-progress || true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: mcp-sentinel-self

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: self-scan-results
          path: results.sarif
